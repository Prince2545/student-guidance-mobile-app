# Render Blueprint: connect repo, then review env vars in dashboard (never commit secrets).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: student-guidance-mentor-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      # Set as Secret in dashboard: NVIDIA_API_KEY, MENTOR_APP_KEY, optional AI_MODEL
      # App needs POST /api/career/analyze-reflections on this service — redeploy after backend changes.
      # Render sets PORT and RENDER=true automatically.
